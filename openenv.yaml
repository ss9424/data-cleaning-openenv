spec_version: 1
name: data-cleaning-env
type: space
runtime: fastapi
app: server.app:app
port: 7860
description: "A real-world OpenEnv simulation for data cleaning. Agents must resolve missing values, format currencies, normalize distributions, and drop duplicates to match a ground-truth dataset."
tasks:
  - id: "easy"
    description: "Fill missing values with medians and drop duplicates."
  - id: "medium"
    description: "Label encode categorical strings, remove currency symbols, and fix data types."
  - id: "hard"
    description: "Perform mathematical conversions and min-max normalization."
tags:
  - openenv
  - data-science
  - pandas