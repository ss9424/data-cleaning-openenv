name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Clear any existing remotes to avoid "already exists" errors
          git remote rm hf || true
          
          # 2. Add the remote with the token embedded directly in the URL
          # Use 'HF_TOKEN' as the username and the token as the password
          git remote add hf https://SS9424:$HF_TOKEN@huggingface.co/spaces/SS9424/data-cleaning-openenv
          
          # 3. Push
          git push --force hf main
