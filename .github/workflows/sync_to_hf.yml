name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Check if the token exists (this will print 'Token is set' or 'Token is EMPTY')
          if [ -z "$HF_TOKEN" ]; then
            echo "Token is EMPTY. Please check your GitHub Secrets!"
            exit 1
          else
            echo "Token is set, proceeding..."
          fi

          # 2. Add the remote with the token explicitly as the username
          # This format 'https://token:hf_xxx@...' is the most reliable for HF
          git remote add hf https://token:$HF_TOKEN@huggingface.co/spaces/SS9424/data-cleaning-openenv || true
          
          # 3. Force push
          git push --force hf main
