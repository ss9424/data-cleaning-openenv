name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Configure Git to use the token in the header for all HF requests
          git config --global http.https://huggingface.co/.extraheader "AUTHORIZATION: bearer $HF_TOKEN"
          
          # 2. Add the remote using the standard HTTPS link
          git remote add hf https://huggingface.co/spaces/SS9424/data-cleaning-openenv || true
          
          # 3. Push to the main branch
          git push --force hf main
