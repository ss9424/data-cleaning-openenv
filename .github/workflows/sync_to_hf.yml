name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Install Hugging Face CLI
        run: pip install -U "huggingface_hub[cli]"

      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Login using the token
          huggingface-cli login --token $HF_TOKEN --add-to-git-credential
          
          # 2. Add the remote (standard URL without token embedded)
          git remote add hf https://huggingface.co/spaces/SS9424/data-cleaning-openenv || true
          
          # 3. Push using the credentials stored by the CLI
          git push --force hf main
